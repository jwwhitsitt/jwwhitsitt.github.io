<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graduation Celebration</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,400&family=Cinzel:wght@400;700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root { --gold:#F0C040; --gold2:#C9973A; --black:#0d0d0d; --cream:#FDF8EE; }
body { background:var(--black); width:100vw; height:100vh; overflow:hidden; font-family:'Lato',sans-serif; cursor:none; }
#confetti-canvas { position:fixed; inset:0; pointer-events:none; z-index:50; }

#show { position:relative; width:100%; height:100%; }
.slide { position:absolute; inset:0; opacity:0; transition:opacity 1.4s ease; display:grid; padding:8px; gap:6px; background:var(--black); }
.slide.active { opacity:1; }
.cell { overflow:hidden; border-radius:3px; background:#111; }
.cell img { width:100%; height:100%; object-fit:cover; display:block; transition:transform 8s ease; }
.slide.active .cell img { transform:scale(1.04); }

.badge {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  z-index:10; background:rgba(13,13,13,0.9); border:1px solid var(--gold2); border-radius:4px;
  padding:1.2rem 2rem; text-align:center; backdrop-filter:blur(8px);
  box-shadow:0 0 50px rgba(0,0,0,0.8),inset 0 0 30px rgba(240,192,64,0.05);
  min-width:200px; pointer-events:none; white-space:nowrap;
}
.badge::before { content:'✦'; position:absolute; top:5px; left:7px; color:var(--gold); font-size:.55rem; opacity:.6; }
.badge::after  { content:'✦'; position:absolute; bottom:5px; right:7px; color:var(--gold); font-size:.55rem; opacity:.6; }
.b-cap  { font-size:1.6rem; line-height:1; display:block; margin-bottom:.2rem; }
.b-co   { font-family:'Cinzel',serif; font-size:.5rem; letter-spacing:.35em; color:var(--gold); text-transform:uppercase; display:block; margin-bottom:.2rem; }
.b-grad { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:2.2rem; color:var(--gold); line-height:1; display:block; text-shadow:0 0 20px rgba(240,192,64,.4); }
.b-name { font-family:'Cinzel',serif; font-size:.7rem; letter-spacing:.18em; color:var(--cream); display:block; margin-top:.35rem; text-transform:uppercase; }
.b-tag  { font-size:.45rem; letter-spacing:.28em; color:var(--gold2); text-transform:uppercase; display:block; margin-top:.4rem; padding-top:.4rem; border-top:1px solid rgba(240,192,64,.2); }

/* Grid Layouts */
.layout-a { grid-template-columns:1fr 1fr 1fr; grid-template-rows:1fr 1fr 1fr; }
.layout-b { grid-template-columns:1.1fr .95fr .95fr 1.1fr; grid-template-rows:1fr 1.2fr 1fr; }
.layout-b .cell:nth-child(5){grid-column:1;grid-row:2;} .layout-b .cell:nth-child(6){grid-column:4;grid-row:2;}
.layout-b .cell:nth-child(7){grid-column:1;grid-row:3;} .layout-b .cell:nth-child(8){grid-column:2;grid-row:3;}
.layout-b .cell:nth-child(9){grid-column:3;grid-row:3;} .layout-b .cell:nth-child(10){grid-column:4;grid-row:3;}
.layout-c { grid-template-columns:1.35fr 1fr 1fr; grid-template-rows:1fr 1fr 1fr 1fr; }
.layout-c .cell:nth-child(1){grid-column:1;grid-row:1/3;} .layout-c .cell:nth-child(6){grid-column:1;grid-row:3/5;}
.layout-d { grid-template-columns:repeat(4,1fr); grid-template-rows:repeat(3,1fr); }
.layout-e { grid-template-columns:1fr 2fr 1fr; grid-template-rows:1fr 1fr 1fr; }
.layout-e .cell:nth-child(5){grid-column:2;grid-row:2/4;}

/* UI */
#counter { position:fixed; bottom:1rem; right:1.5rem; z-index:20; font-size:.58rem; letter-spacing:.3em; color:rgba(240,192,64,.45); text-transform:uppercase; }
#progress { position:fixed; bottom:0; left:0; height:2px; z-index:20; background:linear-gradient(to right,var(--gold2),var(--gold)); width:0%; }
#dots { position:fixed; top:50%; right:1.1rem; transform:translateY(-50%); z-index:20; display:flex; flex-direction:column; gap:6px; }
.dot { width:5px; height:5px; border-radius:50%; background:rgba(240,192,64,.22); cursor:pointer; transition:all .3s; }
.dot.active { background:var(--gold); transform:scale(1.7); }

/* Splash */
#splash { position:fixed; inset:0; z-index:40; background:var(--black); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:.7rem; transition:opacity 1.5s ease; }
#splash.gone { opacity:0; pointer-events:none; }
#splash h1 { font-family:'Cinzel',serif; font-size:clamp(1.4rem,3.5vw,3rem); color:var(--cream); letter-spacing:.15em; text-align:center; }
#splash h2 { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:clamp(3rem,8vw,7rem); color:var(--gold); line-height:1; text-shadow:0 0 40px rgba(240,192,64,.35); text-align:center; }
#splash p  { font-family:'Cinzel',serif; font-size:clamp(.55rem,1.3vw,.85rem); letter-spacing:.4em; color:var(--gold2); text-transform:uppercase; }
.sstar { position:absolute; color:var(--gold); opacity:0; animation:sp 3s ease-in-out infinite; }
@keyframes sp { 0%,100%{opacity:0;transform:scale(.5)} 50%{opacity:.8;transform:scale(1)} }
</style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>

<div id="splash">
  <h1>Congratulations</h1>
  <h2 id="sname">Graduate Name</h2>
  <p id="syear">Class of 2026 · Graduation Party</p>
</div>

<div id="show"></div>
<div id="dots"></div>
<div id="counter"></div>
<div id="progress"></div>

<script>
// ══════════════════════════════════════════════════
//  ★  EDIT THIS CONFIG SECTION  ★
// ══════════════════════════════════════════════════
const CONFIG = {
  name:            "Graduate Name",       // ← graduate's name
  year:            "Class of 2026",
  tagline:         "The Adventure Continues!",
  autoAdvance:     true,
  intervalSeconds: 8,
  photosPerSlide:  10,                    // 8-12 recommended

  // ── HOW TO ADD PHOTOS ──
  // Photos in repo folder:  "photos/001.jpg", "photos/002.jpg" ...
  // External URLs:          paste full https:// links
  // They auto-chunk into groups of photosPerSlide per slide.
  //
  // ↓ REMOVE DEMO LINES BELOW and add real photos ↓
  photos: [
    "https://images.unsplash.com/photo-1523050854058-8df90110c9f1?w=800&q=70",
    "https://images.unsplash.com/photo-1627556704302-624286467c65?w=800&q=70",
    "https://images.unsplash.com/photo-1541339907198-e08756dedf3f?w=800&q=70",
    "https://images.unsplash.com/photo-1580582932707-520aed937b7b?w=800&q=70",
    "https://images.unsplash.com/photo-1612872087720-bb876e2e67d1?w=800&q=70",
    "https://images.unsplash.com/photo-1507679799987-c73779587ccf?w=800&q=70",
    "https://images.unsplash.com/photo-1529156069898-49953e39b3ac?w=800&q=70",
    "https://images.unsplash.com/photo-1517486808906-6ca8b3f04846?w=800&q=70",
    "https://images.unsplash.com/photo-1504593811423-6dd665756598?w=800&q=70",
    "https://images.unsplash.com/photo-1464349095431-e9a21285b5f3?w=800&q=70",
    "https://images.unsplash.com/photo-1519671482749-fd09be7ccebf?w=800&q=70",
    "https://images.unsplash.com/photo-1516450360452-9312f5e86fc7?w=800&q=70",
    "https://images.unsplash.com/photo-1496337589254-7e19d01cec44?w=800&q=70",
    "https://images.unsplash.com/photo-1570913149827-d2ac84ab3f9a?w=800&q=70",
    "https://images.unsplash.com/photo-1501196354995-cbb51c65aaea?w=800&q=70",
    "https://images.unsplash.com/photo-1543269865-cbf427effbad?w=800&q=70",
    "https://images.unsplash.com/photo-1511632765486-a01980e01a18?w=800&q=70",
    "https://images.unsplash.com/photo-1472653431158-6364773b2a56?w=800&q=70",
    "https://images.unsplash.com/photo-1526676317768-d9b14f15615a?w=800&q=70",
    "https://images.unsplash.com/photo-1508214751196-bcfd4ca60f91?w=800&q=70",
    "https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=800&q=70",
    "https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=800&q=70",
    "https://images.unsplash.com/photo-1519345182560-3f2917c472ef?w=800&q=70",
    "https://images.unsplash.com/photo-1504276048855-f3d60e69632f?w=800&q=70",
    "https://images.unsplash.com/photo-1479936343636-73cdc5aae0c3?w=800&q=70",
    "https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?w=800&q=70",
    "https://images.unsplash.com/photo-1502823403499-6ccfcf4fb453?w=800&q=70",
    "https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=800&q=70",
    "https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=800&q=70",
    "https://images.unsplash.com/photo-1488426862026-3ee34a7d66df?w=800&q=70",
  ]
};
// ══════════════════════════════════════════════════

document.getElementById('sname').textContent = CONFIG.name;
document.getElementById('syear').textContent = CONFIG.year + ' · Graduation Party';

const splash = document.getElementById('splash');
[[10,15],[90,10],[5,70],[88,75],[50,8],[15,50],[80,45],[30,85],[70,80],[50,92]].forEach(([l,t],i)=>{
  const s=document.createElement('div'); s.className='sstar';
  s.style.cssText=`left:${l}%;top:${t}%;font-size:${Math.random()*.8+.7}rem;animation-delay:${i*.28}s`;
  s.textContent=i%2===0?'✦':'★'; splash.appendChild(s);
});

const LAYOUTS=['layout-a','layout-b','layout-c','layout-d','layout-e'];
const chunks=[];
for(let i=0;i<CONFIG.photos.length;i+=CONFIG.photosPerSlide)
  chunks.push(CONFIG.photos.slice(i,i+CONFIG.photosPerSlide));

const showEl=document.getElementById('show'), dotsEl=document.getElementById('dots');
let current=0, autoTimer=null;

chunks.forEach((photos,si)=>{
  const layout=LAYOUTS[si%LAYOUTS.length];
  const slide=document.createElement('div');
  slide.className=`slide ${layout}${si===0?' active':''}`;
  photos.forEach(src=>{
    const cell=document.createElement('div'); cell.className='cell';
    const img=document.createElement('img'); img.src=src; img.alt='';
    img.loading=si<2?'eager':'lazy'; cell.appendChild(img); slide.appendChild(cell);
  });
  const badge=document.createElement('div'); badge.className='badge';
  badge.innerHTML=`<span class="b-cap">🎓</span><span class="b-co">${CONFIG.year}</span><span class="b-grad">Graduate</span><span class="b-name">${CONFIG.name}</span><span class="b-tag">${CONFIG.tagline}</span>`;
  slide.appendChild(badge); showEl.appendChild(slide);
  const dot=document.createElement('div'); dot.className=`dot${si===0?' active':''}`;
  dot.addEventListener('click',()=>{clearInterval(autoTimer);goTo(si);startAuto();});
  dotsEl.appendChild(dot);
});

const slides=document.querySelectorAll('.slide'), dots=document.querySelectorAll('.dot');
const counterEl=document.getElementById('counter'), progressEl=document.getElementById('progress');

function updateCounter(){counterEl.textContent=`${current+1} / ${slides.length}`;}
function startProgress(){
  progressEl.style.transition='none'; progressEl.style.width='0%';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    progressEl.style.transition=`width ${CONFIG.intervalSeconds}s linear`; progressEl.style.width='100%';
  }));
}
function goTo(n){
  slides[current].classList.remove('active'); dots[current].classList.remove('active');
  current=((n%slides.length)+slides.length)%slides.length;
  slides[current].classList.add('active'); dots[current].classList.add('active');
  updateCounter(); if(CONFIG.autoAdvance)startProgress();
}
function next(){goTo(current+1);}
function startAuto(){if(!CONFIG.autoAdvance)return; startProgress(); autoTimer=setInterval(next,CONFIG.intervalSeconds*1000);}

document.addEventListener('click',()=>{clearInterval(autoTimer);next();startAuto();});
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '){clearInterval(autoTimer);next();startAuto();}
  if(e.key==='ArrowLeft'){clearInterval(autoTimer);goTo(current-1);startAuto();}
  if(e.key==='f'||e.key==='F')document.documentElement.requestFullscreen?.();
});
updateCounter();
setTimeout(()=>{splash.classList.add('gone');setTimeout(()=>splash.remove(),1600);startAuto();},3500);

// Confetti
const canvas=document.getElementById('confetti-canvas'),ctx=canvas.getContext('2d');
function resize(){canvas.width=innerWidth;canvas.height=innerHeight;} resize(); window.addEventListener('resize',resize);
const COLORS=['#F0C040','#C9973A','#FDF8EE','#E8407A','#7B61FF','#42D9C8'];
const pieces=Array.from({length:90},()=>({
  x:Math.random()*innerWidth, y:Math.random()*innerHeight-innerHeight,
  r:Math.random()*5+2, speed:Math.random()*1.2+.4,
  color:COLORS[Math.floor(Math.random()*COLORS.length)],
  angle:Math.random()*Math.PI*2, spin:(Math.random()-.5)*.07,
  wobble:Math.random()*Math.PI*2, wobbleSpeed:Math.random()*.035+.01,
  shape:Math.random()>.4?'rect':'circle', w:Math.random()*7+3, h:Math.random()*13+5
}));
(function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  pieces.forEach(p=>{
    p.wobble+=p.wobbleSpeed; p.angle+=p.spin; p.y+=p.speed; p.x+=Math.sin(p.wobble)*.65;
    if(p.y>canvas.height+20){p.y=-20;p.x=Math.random()*canvas.width;}
    ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.angle);
    ctx.fillStyle=p.color; ctx.globalAlpha=.72;
    if(p.shape==='rect')ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
    else{ctx.beginPath();ctx.ellipse(0,0,p.r,p.r*.55,0,0,Math.PI*2);ctx.fill();}
    ctx.restore();
  });
  requestAnimationFrame(draw);
})();
</script>
</body>
</html>
